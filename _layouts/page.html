---
layout: default
---
<article class="page">
  <div class="container">
    {% if page.title %}
    <header class="page__header">
      <h1 class="page__title">{{ page.title }}</h1>
    </header>
    {% endif %}
    <div class="page__content prose">
      {{ content }}
    </div>
  </div>
</article>
