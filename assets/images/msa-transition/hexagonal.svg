<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <style>
    .core { fill: #fff7e6; stroke: #d19a3a; stroke-width: 2; }
    .adapter { fill: #eef6ff; stroke: #3a7bc8; stroke-width: 1.5; }
    .infra { fill: #f4f4f4; stroke: #999; stroke-width: 1; stroke-dasharray: 4 3; }
    .title { font-size: 14px; font-weight: 600; fill: #111; }
    .heading { font-size: 13px; font-weight: 600; fill: #222; }
    .label { font-size: 12px; fill: #222; }
    .small { font-size: 11px; fill: #555; }
    .muted { font-size: 11px; fill: #888; font-style: italic; }
    .connector { stroke: #aaa; stroke-width: 1.2; fill: none; }
    .dashed { stroke: #bbb; stroke-width: 1; stroke-dasharray: 3 3; fill: none; }
  </style>

  <text class="title" x="360" y="30" text-anchor="middle">Hexagonal — apps/*는 어댑터, libs/domain이 코어</text>

  <!-- Core domain -->
  <rect class="core" x="230" y="155" width="260" height="150" rx="8"/>
  <text class="heading" x="360" y="180" text-anchor="middle">libs/domain (Core)</text>
  <text class="small" x="360" y="202" text-anchor="middle">Entity · Value Object · Aggregate</text>
  <text class="small" x="360" y="219" text-anchor="middle">Repository Interface · Domain Service</text>
  <text class="muted" x="360" y="248" text-anchor="middle">프레임워크 · DB · HTTP 의존 없음</text>
  <text class="muted" x="360" y="272" text-anchor="middle">HospitalReservation, ReceiptCreateService,</text>
  <text class="muted" x="360" y="288" text-anchor="middle">ChangeHospitalReservationUseCase ...</text>

  <!-- Adapters -->
  <rect class="adapter" x="50" y="70" width="160" height="62" rx="5"/>
  <text class="heading" x="130" y="94" text-anchor="middle">apps/api</text>
  <text class="small" x="130" y="114" text-anchor="middle">REST Controller (Fastify)</text>

  <rect class="adapter" x="510" y="70" width="160" height="62" rx="5"/>
  <text class="heading" x="590" y="94" text-anchor="middle">apps/consumer</text>
  <text class="small" x="590" y="114" text-anchor="middle">Kafka Consumer</text>

  <rect class="adapter" x="50" y="330" width="160" height="62" rx="5"/>
  <text class="heading" x="130" y="354" text-anchor="middle">apps/batch</text>
  <text class="small" x="130" y="374" text-anchor="middle">nest-commander</text>

  <rect class="adapter" x="510" y="330" width="160" height="62" rx="5"/>
  <text class="heading" x="590" y="354" text-anchor="middle">apps/agent</text>
  <text class="small" x="590" y="374" text-anchor="middle">Scheduler / Worker</text>

  <!-- Connectors adapter -> core -->
  <line class="connector" x1="210" y1="105" x2="240" y2="170"/>
  <line class="connector" x1="510" y1="105" x2="480" y2="170"/>
  <line class="connector" x1="210" y1="355" x2="240" y2="290"/>
  <line class="connector" x1="510" y1="355" x2="480" y2="290"/>

  <!-- Infra row -->
  <rect class="infra" x="230" y="330" width="78" height="40" rx="4"/>
  <text class="small" x="269" y="355" text-anchor="middle">MongoDB</text>
  <rect class="infra" x="321" y="330" width="78" height="40" rx="4"/>
  <text class="small" x="360" y="355" text-anchor="middle">Redis</text>
  <rect class="infra" x="412" y="330" width="78" height="40" rx="4"/>
  <text class="small" x="451" y="355" text-anchor="middle">Kafka</text>

  <line class="dashed" x1="269" y1="305" x2="269" y2="330"/>
  <line class="dashed" x1="360" y1="305" x2="360" y2="330"/>
  <line class="dashed" x1="451" y1="305" x2="451" y2="330"/>

  <text class="muted" x="360" y="395" text-anchor="middle">Repository / MessageBus 구현체(어댑터)에서 주입</text>

  <!-- small side note -->
  <text class="small" x="130" y="152" text-anchor="middle" fill="#777">(Primary)</text>
  <text class="small" x="590" y="152" text-anchor="middle" fill="#777">(Primary)</text>
  <text class="small" x="130" y="317" text-anchor="middle" fill="#777">(Primary)</text>
  <text class="small" x="590" y="317" text-anchor="middle" fill="#777">(Primary)</text>

  <!-- legend -->
  <g transform="translate(40,420)">
    <rect class="core" x="0" y="0" width="14" height="10"/>
    <text class="small" x="20" y="10">Core (libs/domain)</text>
    <rect class="adapter" x="160" y="0" width="14" height="10"/>
    <text class="small" x="180" y="10">Adapter (apps/*)</text>
    <rect class="infra" x="320" y="0" width="14" height="10"/>
    <text class="small" x="340" y="10">External Infra</text>
  </g>
</svg>
