<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <style>
    .stage { fill: #fff; stroke: #2891c4; stroke-width: 1.6; }
    .num { fill: #2891c4; font-size: 11px; font-weight: 700; }
    .name { font-size: 14px; font-weight: 700; fill: #111; }
    .desc { font-size: 11.5px; fill: #444; }
    .small { font-size: 10.5px; fill: #777; }
    .code { font-size: 10.5px; fill: #2891c4; font-family: 'SF Mono', Menlo, Consolas, monospace; }
    .arrow { stroke: #3a7ca8; stroke-width: 1.8; fill: none; }
    .source { fill: #f5f5f5; stroke: #999; stroke-width: 1.3; }
    .target { fill: #f0fbff; stroke: #2891c4; stroke-width: 1.6; }
    .source-label { font-size: 12px; font-weight: 600; fill: #555; }
    .target-label { font-size: 12px; font-weight: 600; fill: #2891c4; }
  </style>
  <defs>
    <marker id="ar-flow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3a7ca8"/>
    </marker>
  </defs>

  <text class="name" x="460" y="40" text-anchor="middle" font-size="15">Snowflake CDC ETL — External Table → Stream → Task → Table</text>

  <!-- S3 source -->
  <rect class="source" x="30" y="120" width="100" height="80" rx="4"/>
  <text class="source-label" x="80" y="155" text-anchor="middle">S3</text>
  <text class="small" x="80" y="173" text-anchor="middle">CDC JSON</text>
  <text class="small" x="80" y="187" text-anchor="middle">(gzip)</text>

  <line class="arrow" x1="130" y1="160" x2="160" y2="160" marker-end="url(#ar-flow)"/>

  <!-- 1. External Table -->
  <rect class="stage" x="160" y="100" width="160" height="120" rx="6"/>
  <text class="num" x="170" y="118">STEP 1</text>
  <text class="name" x="240" y="142" text-anchor="middle" font-size="13">External Table</text>
  <text class="desc" x="240" y="166" text-anchor="middle">S3 데이터를</text>
  <text class="desc" x="240" y="182" text-anchor="middle">테이블처럼 참조</text>
  <text class="code" x="240" y="204" text-anchor="middle">cluster_time, _id,</text>
  <text class="code" x="240" y="216" text-anchor="middle">operation_type</text>

  <line class="arrow" x1="320" y1="160" x2="350" y2="160" marker-end="url(#ar-flow)"/>

  <!-- 2. Stream -->
  <rect class="stage" x="350" y="100" width="160" height="120" rx="6"/>
  <text class="num" x="360" y="118">STEP 2</text>
  <text class="name" x="430" y="142" text-anchor="middle" font-size="13">Stream</text>
  <text class="desc" x="430" y="166" text-anchor="middle">새로 추가된 행을</text>
  <text class="desc" x="430" y="182" text-anchor="middle">자동 추적</text>
  <text class="code" x="430" y="204" text-anchor="middle">INSERT_ONLY = true</text>

  <line class="arrow" x1="510" y1="160" x2="540" y2="160" marker-end="url(#ar-flow)"/>

  <!-- 3. Task -->
  <rect class="stage" x="540" y="100" width="160" height="120" rx="6"/>
  <text class="num" x="550" y="118">STEP 3</text>
  <text class="name" x="620" y="142" text-anchor="middle" font-size="13">Task</text>
  <text class="desc" x="620" y="166" text-anchor="middle">스케줄/의존성으로</text>
  <text class="desc" x="620" y="182" text-anchor="middle">MERGE 실행</text>
  <text class="code" x="620" y="204" text-anchor="middle">AFTER refresh_task</text>

  <line class="arrow" x1="700" y1="160" x2="730" y2="160" marker-end="url(#ar-flow)"/>

  <!-- 4. Target Table -->
  <rect class="target" x="730" y="100" width="160" height="120" rx="6"/>
  <text class="num" x="740" y="118">STEP 4</text>
  <text class="target-label" x="810" y="142" text-anchor="middle" font-size="13">Target Table</text>
  <text class="desc" x="810" y="166" text-anchor="middle">유관부서가 조회하는</text>
  <text class="desc" x="810" y="182" text-anchor="middle">최종 테이블</text>
  <text class="code" x="810" y="204" text-anchor="middle">COMMENT, 마스킹</text>

  <!-- 하단 부연: MERGE 동작 -->
  <rect fill="#fafbfc" stroke="#dde2e8" stroke-width="1" x="160" y="265" width="730" height="90" rx="6"/>
  <text class="name" x="180" y="290" font-size="12.5">Task의 MERGE 동작</text>
  <text class="desc" x="180" y="312">1. 같은 _id에 여러 이벤트 → cluster_time 기준 최신만 사용 (ROW_NUMBER + QUALIFY)</text>
  <text class="desc" x="180" y="330">2. operation_type 에 따라 INSERT / UPDATE / DELETE를 하나의 MERGE 문으로 처리</text>
  <text class="desc" x="180" y="348">3. AFTER external_table_refresh_task 의존성으로 Refresh 완료 후 자동 실행</text>
</svg>
